<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline';"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent Terminal</title>
    <link rel="stylesheet" href="../../node_modules/@xterm/xterm/css/xterm.css" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <div class="window-chrome">
        <div class="chrome-spacer" aria-hidden="true"></div>
        <div class="chrome-title">Agent Terminal</div>
        <div class="chrome-hint">⌘K</div>
      </div>

      <header class="commandbar">
        <div class="brand">
          <div class="terminal-mark" aria-hidden="true">›_</div>
          <span id="connectionStatus" class="status-pill">Local control server starting</span>
        </div>

        <div class="commandbar-actions">
          <button id="toggleSessions" class="icon-button" title="Toggle terminals" aria-label="Toggle terminals">
            <span aria-hidden="true">☰</span>
          </button>
          <button id="pauseAgents" class="text-button">
            <span class="btn-glyph pause" aria-hidden="true">❚❚</span>
            <span>Pause Agents</span>
          </button>
          <button id="toggleApi" class="text-button danger">Disable Control</button>
          <button id="copyAgentPrompt" class="text-button primary agent-prompt-button" title="Copy instructions for another AI agent">
            <span class="copy-glyph" aria-hidden="true">⧉</span>
            <span class="btn-label">Copy Agent Prompt</span>
          </button>
        </div>
      </header>

      <section class="workspace">
        <aside id="sessionPanel" class="session-panel">
          <div class="session-panel-header">
            <span class="session-panel-title">Terminals</span>
            <button id="newSession" class="icon-button ghost" title="New terminal" aria-label="New terminal">
              <span aria-hidden="true">＋</span>
            </button>
          </div>
          <div id="sessionList" class="session-list empty">No terminals yet</div>
          <div class="session-summary">
            <span id="sessionCount">0 terminals</span>
            <span id="activeSessionCount" class="active">0 active</span>
          </div>
        </aside>
        <section class="terminal-frame">
          <div class="terminal-header">
            <p id="shellLabel" class="terminal-path">Starting terminal...</p>
          </div>
          <div id="terminal"></div>
        </section>
      </section>

      <footer class="statusline">
        <button id="copyApi" class="status-chip" title="Copy API URL">
          <span class="chip-label">API</span>
          <strong id="apiUrl">Starting...</strong>
          <span class="chip-glyph" aria-hidden="true">⧉</span>
        </button>
        <span class="chip-divider" aria-hidden="true"></span>
        <button id="copyToken" class="status-chip" title="Copy API token">
          <span class="chip-label">Token</span>
          <strong id="apiToken">Hidden</strong>
          <span id="revealToken" class="reveal-link" role="button" tabindex="0" title="Reveal token">Reveal</span>
        </button>
        <span class="chip-divider" aria-hidden="true"></span>
        <button id="copySession" class="status-chip" title="Copy session ID">
          <span class="chip-label">Session</span>
          <strong id="sessionId">-----</strong>
          <span class="chip-glyph" aria-hidden="true">⧉</span>
        </button>
        <span id="lastAction" class="statusline-action">Waiting for terminal output</span>
        <span class="destructive-badge" title="Local API only · destructive commands blocked">
          <span class="badge-check" aria-hidden="true">✓</span>
          <span>Destructive blocked</span>
        </span>
        <span id="termSize" class="term-size" aria-label="Terminal dimensions">—</span>
      </footer>
    </main>

    <script src="../../node_modules/@xterm/xterm/lib/xterm.js"></script>
    <script src="../../node_modules/@xterm/addon-fit/lib/addon-fit.js"></script>
    <script src="./renderer.js"></script>
  </body>
</html>
